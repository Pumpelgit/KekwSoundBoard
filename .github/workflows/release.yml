name: Release Addon

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ZIPNAME="KekwSoundBoard-${GITHUB_REF_NAME}.zip"

          mkdir -p out/KekwSoundBoard
          cp KekwSoundBoard.lua KekwSoundBoard.toc KekwSoundBoard.xml KekwSoundBoardData.lua out/KekwSoundBoard/
          cp -r KekwSoundBoard_Classic out/KekwSoundBoard_Classic

          cd out && zip -r ../$ZIPNAME KekwSoundBoard/ KekwSoundBoard_Classic/
          cd ..

          cat > release.json << EOF
          {
            "releases": [
              {
                "name": "KekwSoundBoard",
                "version": "$VERSION",
                "filename": "$ZIPNAME",
                "nolib": false,
                "metadata": [
                  {"flavor": "mainline", "interface": 120001}
                ]
              }
            ]
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KekwSoundBoard-*.zip
            release.json

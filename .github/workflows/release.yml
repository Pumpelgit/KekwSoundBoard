name: Release Addon

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          mkdir -p out/KekwSoundBoard
          cp KekwSoundBoard.lua KekwSoundBoard.toc KekwSoundBoard.xml KekwSoundBoardData.lua out/KekwSoundBoard/
          cd out && zip -r ../KekwSoundBoard-${{ github.ref_name }}.zip KekwSoundBoard/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: KekwSoundBoard-*.zip

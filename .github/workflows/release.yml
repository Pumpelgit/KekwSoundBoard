name: Release Addon

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@v2

      - name: Add stable download ZIP
        run: |
          find . -name "KekwSoundBoard-*.zip" -exec cp {} KekwSoundBoard.zip \;
          ls -la KekwSoundBoard.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: KekwSoundBoard.zip
